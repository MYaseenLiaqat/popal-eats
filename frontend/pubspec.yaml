name: popal_eats
description: Popal Eats — food delivery client for Popal Eats API
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  geolocator: ^13.0.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  file_picker: ^8.1.4
  video_player: ^2.9.2
  google_maps_flutter: ^2.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/cuisines/
    - assets/images/allergies/
